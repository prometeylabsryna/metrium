services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metrium}
      POSTGRES_USER: ${POSTGRES_USER:-metrium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metrium}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./archive/wp-content/uploads:/app/wp-uploads:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
