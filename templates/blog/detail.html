{% extends "base.html" %}
{% load static %}

{% block content %}
<nav class="breadcrumb_container" aria-label="Навігація">
  <div class="container-max">
    <ul class="breadcrumbs" itemscope itemtype="https://schema.org/BreadcrumbList">
      <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <a href="/" itemprop="item"><span itemprop="name">Головна</span></a>
        <meta itemprop="position" content="1">
      </li>
      <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <a href="/blog/" itemprop="item"><span itemprop="name">Блог</span></a>
        <meta itemprop="position" content="2">
      </li>
      <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <span itemprop="name">{{ post.title|truncatewords:8 }}</span>
        <meta itemprop="position" content="3">
      </li>
    </ul>
  </div>
</nav>

<section class="blogPost" itemscope itemtype="https://schema.org/NewsArticle">
  <div class="container-max">
    <h1 class="pt70" itemprop="headline">{{ post.title }}</h1>

    {% if post.featured_image %}
    <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" class="imgBgPoster" itemprop="image" loading="lazy">
    {% endif %}

    {% if post.published_at %}
    <meta itemprop="datePublished" content="{{ post.published_at|date:'d.m.Y' }}">
    {% endif %}

    <div class="row contentBlock" itemprop="articleBody">
      <div class="col-12">
        {{ post.get_body_html|safe }}
      </div>
    </div>
  </div>
</section>
{% endblock %}
