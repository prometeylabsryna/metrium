{% load static i18n_tags %}
<div class="floating-cta" id="floatingCta">
  <a href="tel:0673986200" class="float-btn float-call" aria-label="{% bi 'global' 'floating.call' 'Зателефонувати' 'Позвонить' %}">
    <img src="{% static 'images/kata/tel.svg' %}" alt="tel" width="18" height="18"><span>{% bi 'global' 'floating.call' 'Зателефонувати' 'Позвонить' %}</span>
  </a>
  <a href="{{ MESSENGERS.telegram }}" class="float-btn float-tg" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
    <img src="{% static 'images/kata/telega.svg' %}" alt="tg" width="18" height="18"><span>Telegram</span>
  </a>
  <a href="{{ MESSENGERS.viber }}" class="float-btn float-viber" aria-label="Viber">
    <img src="{% static 'images/kata/viber.svg' %}" alt="vb" width="18" height="18"><span>Viber</span>
  </a>
  <a href="{{ MESSENGERS.whatsapp }}" class="float-btn float-wa" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
    <img src="{% static 'images/kata/whatsapp.webp' %}" alt="wa" width="18" height="18"><span>WhatsApp</span>
  </a>
</div>
